name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [ "", "--features http_assets" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace ${{ matrix.features }}
      - name: CLI dry-run publish
        run: |
          cargo build -p vysma
          cargo run -p vysma -- module publish --dry-run --module demo --version 0.0.0 --root assets/moba_hcl 